<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Flipbook</title>

<!-- CSS de Turn.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/blasten/turn.js@4/turn.min.css">

<!-- Estilo para responsive -->
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  padding: 20px;
}
#flipbook {
  width: 90%;
  max-width: 800px;
  margin: 0 auto;
}
#flipbook div {
  background: white;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
canvas {
  width: 100% !important;
  height: auto !important;
}
</style>
</head>
<body>

<div id="flipbook"></div>

<!-- Librerías JS desde CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@4/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.15.141/pdf.min.js"></script>

<script>
const url = 'catalogo.pdf'; // PDF en la misma carpeta

// Configuración de PDF.js
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.15.141/pdf.worker.min.js';

pdfjsLib.getDocument(url).promise.then(pdf => {
  let loadedPages = 0;

  for (let i = 1; i <= pdf.numPages; i++) {
    pdf.getPage(i).then(page => {
      const scale = 1.5;
      const viewport = page.getViewport({scale: scale});
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;

      page.render({canvasContext: context, viewport: viewport}).promise.then(() => {
        const pageDiv = document.createElement('div');
        pageDiv.appendChild(canvas);
        document.getElementById('flipbook').appendChild(pageDiv);

        loadedPages++;
        if (loadedPages === pdf.numPages) {
          // Inicializar flipbook cuando todas las páginas estén listas
          $('#flipbook').turn({
            width: $('#flipbook').width(),
            height: viewport.height * ($('#flipbook').width()/viewport.width),
            autoCenter: true,
            display: 'double',
            acceleration: true
          });
        }
      });
    });
  }
}).catch(err => {
  console.error('Error al cargar el PDF:', err);
});
</script>

</body>
</html>
